name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Aspire workload
      run: dotnet workload install aspire

    - name: Restore tools
      run: dotnet tool restore

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test with coverage
      run: |
        dotnet dotnet-coverage collect \
          --settings ./coverage.runsettings \
          --output ./.coverage/coverage.cobertura.xml \
          --output-format cobertura \
          "dotnet test --no-build -c Release --verbosity normal"

    - name: Generate coverage report
      run: |
        dotnet reportgenerator \
          "-reports:./.coverage/coverage.cobertura.xml" \
          "-targetdir:./.coverage" \
          -reporttypes:"Html_Dark;Badges" \
          "-classfilters:-Microsoft.*;-System.*;-Wolverine.Generated.*" \
          "-filefilters:-*.g.cs;-*.generated.cs"

    - name: Extract coverage and test counts
      id: metrics
      run: |
        RATE=$(head -5 ./.coverage/coverage.cobertura.xml | grep -oP 'line-rate="\K[^"]+' | head -1)
        PCT=$(echo "$RATE * 100" | bc | sed 's/\..*//')
        echo "coverage=$PCT" >> "$GITHUB_OUTPUT"

        UNIT=$(find tests/UnitTests -name '*.cs' ! -path '*/obj/*' | xargs grep -ch '\[Fact\]\|\[Theory\]' 2>/dev/null | paste -sd+ | bc)
        INT=$(find tests/IntegrationTests -name '*.cs' ! -path '*/obj/*' | xargs grep -ch '\[Fact\]\|\[Theory\]' 2>/dev/null | paste -sd+ | bc)
        : ${UNIT:=0} ${INT:=0}
        echo "unit=$UNIT" >> "$GITHUB_OUTPUT"
        echo "integration=$INT" >> "$GITHUB_OUTPUT"

    - name: Update Gist badges
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        COVERAGE: ${{ steps.metrics.outputs.coverage }}
        UNIT: ${{ steps.metrics.outputs.unit }}
        INT: ${{ steps.metrics.outputs.integration }}
      run: |
        echo "{\"schemaVersion\":1,\"label\":\"Coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"blue\"}" > /tmp/coverage.json
        echo "{\"schemaVersion\":1,\"label\":\"Unit Tests\",\"message\":\"${UNIT}\",\"color\":\"blueviolet\"}" > /tmp/unit.json
        echo "{\"schemaVersion\":1,\"label\":\"Int Tests\",\"message\":\"${INT}\",\"color\":\"orange\"}" > /tmp/integration.json

        gh api -X PATCH /gists/66489e99c3b00af77142df8d681d62b3 \
          -f "files[coverage.json][content]=$(cat /tmp/coverage.json)" \
          -f "files[unit.json][content]=$(cat /tmp/unit.json)" \
          -f "files[integration.json][content]=$(cat /tmp/integration.json)"
