name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Update Aspire workload
        run: dotnet workload install aspire

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ./ResumeAnalyzer.slnx

      - name: Build
        run: dotnet build --no-restore -c Release ./ResumeAnalyzer.slnx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Test with coverage
        run: |
          dotnet dotnet-coverage collect \
            --settings ./coverage.runsettings \
            --output ./.coverage/coverage.cobertura.xml \
            --output-format cobertura \
            "dotnet test --no-build -c Release ./ResumeAnalyzer.slnx"

  publish:
    name: Publish API container
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ResumeAnalyzer.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resumeanalyzer-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/resumeanalyzer-api:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && format('ghcr.io/{0}/resumeanalyzer-api:latest', github.repository_owner) || '' }}
