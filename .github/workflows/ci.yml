name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Update Aspire workload
        run: dotnet workload install aspire

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ./ResumeAnalyzer.slnx

      - name: Build
        run: dotnet build --no-restore -c Release ./ResumeAnalyzer.slnx

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Configure pnpm
        run: pnpm config set minimumReleaseAge 0 --location=project
        working-directory: web

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Test with coverage
        run: |
          dotnet dotnet-coverage collect \
            --settings ./coverage.runsettings \
            --output ./.coverage/coverage.cobertura.xml \
            --output-format cobertura \
            "dotnet test --no-build -c Release ./ResumeAnalyzer.slnx --logger trx --results-directory ./.coverage/trx"

      - name: Test report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Test results
          path: ./.coverage/trx/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Generate coverage report
        if: github.ref == 'refs/heads/main'
        run: |
          dotnet reportgenerator \
            "-reports:./.coverage/coverage.cobertura.xml" \
            "-targetdir:./.coverage/report" \
            -reporttypes:"Html_Dark" \
            "-classfilters:-Microsoft.*;-System.*"

      - name: Push coverage report to dashboard
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          gh repo clone spicycoder/dashboard /tmp/dashboard
          cd /tmp/dashboard
          git checkout gh-pages
          rm -rf resume-analyzer/coverage
          cp -r "$GITHUB_WORKSPACE/.coverage/report" resume-analyzer/coverage
          git add .
          git -c user.name="CI" -c user.email="ci@spicycoder.dev" \
            commit -m "Update resume-analyzer coverage [skip ci]" --allow-empty
          git remote set-url origin https://spicycoder:${GH_TOKEN}@github.com/spicycoder/dashboard.git
          git push

  publish:
    name: Publish API container
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ResumeAnalyzer.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/resumeanalyzer-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/resumeanalyzer-api:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && format('ghcr.io/{0}/resumeanalyzer-api:latest', github.repository_owner) || '' }}

  deploy-frontend:
    name: Deploy frontend to gh-pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_CLARITY_ID: ${{ vars.VITE_CLARITY_ID }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
