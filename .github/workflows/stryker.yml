name: Mutation Testing

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  stryker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore ./ResumeAnalyzer.slnx

      - name: Build
        run: dotnet build --no-restore -c Release ./ResumeAnalyzer.slnx

      - name: Run Stryker
        run: dotnet stryker --solution ResumeAnalyzer.slnx --output stryker-output

      - name: Push mutation report to dashboard
        env:
          GH_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          gh repo clone spicycoder/dashboard /tmp/dashboard
          cd /tmp/dashboard
          git checkout gh-pages
          rm -rf resume-analyzer/stryker
          cp -r "$GITHUB_WORKSPACE/stryker-output" resume-analyzer/stryker
          git add .
          git -c user.name="CI" -c user.email="ci@spicycoder.dev" \
            commit -m "Update resume-analyzer stryker report [skip ci]" --allow-empty
          git push
